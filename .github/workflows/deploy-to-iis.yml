name: Deploy to IIS from GitHub Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  DOTNET_VERSION: '8.0.x'
  APP_PROJECT: 'src/DeployToIisDemo/DeployToIisDemo.csproj'
  PUBLISH_OUTPUT: './publish'
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_VM_NAME: ${{ vars.AZURE_VM_NAME }}
  IIS_SITE_NAME: ${{ vars.IIS_SITE_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.APP_PROJECT }}

      - name: Build
        run: dotnet build ${{ env.APP_PROJECT }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.APP_PROJECT }} --configuration Release --no-build --output ${{ env.PUBLISH_OUTPUT }}

      - name: Create deployment package
        run: |
          PACKAGE_PATH="${RUNNER_TEMP}/deploy-to-iis-demo-${GITHUB_SHA}.zip"
          (cd "${PUBLISH_OUTPUT}" && zip -qr "$PACKAGE_PATH" .)
          echo "PACKAGE_PATH=$PACKAGE_PATH" >> "$GITHUB_ENV"

      - name: Validate Azure deployment configuration
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          missing=0
          for name in AZURE_RESOURCE_GROUP AZURE_VM_NAME IIS_SITE_NAME; do
            if [ -z "${!name}" ]; then
              echo "Missing required repository variable: $name" >&2
              missing=1
            fi
          done

          for name in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID; do
            if [ -z "${!name}" ]; then
              echo "Missing required repository secret: $name" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create GitHub Release and publish deployment asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_TAG="deploy-run-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          RELEASE_NAME="Deployment run ${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          PACKAGE_NAME="deploy-to-iis-demo-${GITHUB_SHA}.zip"

          gh release create "$RELEASE_TAG" "$PACKAGE_PATH#${PACKAGE_NAME}" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$RELEASE_NAME" \
            --notes "Automated deployment package for commit ${GITHUB_SHA}."

          PACKAGE_URL="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" \
            --jq '.assets[] | select(.name == "'"${PACKAGE_NAME}"'") | .url')"

          if [ -z "$PACKAGE_URL" ]; then
            echo "Failed to resolve the release asset API URL." >&2
            exit 1
          fi

          PACKAGE_URL_BASE64="$(printf '%s' "$PACKAGE_URL" | base64 | tr -d '\n')"
          echo "PACKAGE_URL_BASE64=$PACKAGE_URL_BASE64" >> "$GITHUB_ENV"

      - name: Deploy package on VM
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_RELEASE_DOWNLOAD_TOKEN: ${{ secrets.GITHUB_RELEASE_DOWNLOAD_TOKEN }}
        run: |
          DOWNLOAD_TOKEN="${GITHUB_RELEASE_DOWNLOAD_TOKEN:-$GITHUB_TOKEN}"
          PACKAGE_AUTH_TOKEN_BASE64="$(printf '%s' "$DOWNLOAD_TOKEN" | base64 | tr -d '\n')"

          az vm run-command invoke \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_VM_NAME" \
            --command-id RunPowerShellScript \
            --scripts @infra/deploy-app.ps1 \
            --parameters \
              "PackageUrlBase64=$PACKAGE_URL_BASE64" \
              "PackageAuthTokenBase64=$PACKAGE_AUTH_TOKEN_BASE64" \
              "PackageAuthHeaderScheme=Bearer" \
              "SiteName=$IIS_SITE_NAME"
