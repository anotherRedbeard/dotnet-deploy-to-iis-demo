name: Deploy to IIS with Azure Run Command

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  DOTNET_VERSION: '8.0.x'
  APP_PROJECT: 'src/DeployToIisDemo/DeployToIisDemo.csproj'
  PUBLISH_OUTPUT: './publish'
  AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  AZURE_VM_NAME: ${{ vars.AZURE_VM_NAME }}
  AZURE_STORAGE_ACCOUNT: ${{ vars.AZURE_STORAGE_ACCOUNT }}
  AZURE_STORAGE_CONTAINER: ${{ vars.AZURE_STORAGE_CONTAINER }}
  IIS_SITE_NAME: ${{ vars.IIS_SITE_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ${{ env.APP_PROJECT }}

      - name: Build
        run: dotnet build ${{ env.APP_PROJECT }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.APP_PROJECT }} --configuration Release --no-build --output ${{ env.PUBLISH_OUTPUT }}

      - name: Create deployment package
        run: |
          PACKAGE_PATH="${RUNNER_TEMP}/deploy-to-iis-demo-${GITHUB_SHA}.zip"
          (cd "${PUBLISH_OUTPUT}" && zip -qr "$PACKAGE_PATH" .)
          echo "PACKAGE_PATH=$PACKAGE_PATH" >> "$GITHUB_ENV"

      - name: Validate Azure deployment configuration
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          missing=0
          for name in AZURE_RESOURCE_GROUP AZURE_VM_NAME AZURE_STORAGE_ACCOUNT AZURE_STORAGE_CONTAINER IIS_SITE_NAME; do
            if [ -z "${!name}" ]; then
              echo "Missing required repository variable: $name" >&2
              missing=1
            fi
          done

          for name in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID; do
            if [ -z "${!name}" ]; then
              echo "Missing required repository secret: $name" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload package and generate SAS URL
        run: |
          BLOB_NAME="${GITHUB_RUN_ID}/${GITHUB_SHA}.zip"
          az storage blob upload \
            --account-name "$AZURE_STORAGE_ACCOUNT" \
            --container-name "$AZURE_STORAGE_CONTAINER" \
            --name "$BLOB_NAME" \
            --file "$PACKAGE_PATH" \
            --overwrite true \
            --auth-mode login

          EXPIRY_UTC="$(date -u -d '+1 hour' '+%Y-%m-%dT%H:%MZ')"
          SAS_TOKEN="$(az storage blob generate-sas \
            --account-name "$AZURE_STORAGE_ACCOUNT" \
            --container-name "$AZURE_STORAGE_CONTAINER" \
            --name "$BLOB_NAME" \
            --permissions r \
            --expiry "$EXPIRY_UTC" \
            --https-only \
            --as-user \
            --auth-mode login \
            --output tsv)"

          PACKAGE_URL="https://${AZURE_STORAGE_ACCOUNT}.blob.core.windows.net/${AZURE_STORAGE_CONTAINER}/${BLOB_NAME}?${SAS_TOKEN}"
          PACKAGE_URL_BASE64="$(printf '%s' "$PACKAGE_URL" | base64 | tr -d '\n')"
          echo "DEPLOYMENT_BLOB_NAME=$BLOB_NAME" >> "$GITHUB_ENV"
          echo "PACKAGE_URL_BASE64=$PACKAGE_URL_BASE64" >> "$GITHUB_ENV"

      - name: Deploy package on VM
        run: |
          az vm run-command invoke \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_VM_NAME" \
            --command-id RunPowerShellScript \
            --scripts @infra/deploy-app.ps1 \
            --parameters "PackageUrlBase64=$PACKAGE_URL_BASE64" "SiteName=$IIS_SITE_NAME"

      - name: Remove uploaded package
        if: ${{ success() }}
        run: |
          az storage blob delete \
            --account-name "$AZURE_STORAGE_ACCOUNT" \
            --container-name "$AZURE_STORAGE_CONTAINER" \
            --name "$DEPLOYMENT_BLOB_NAME" \
            --auth-mode login
